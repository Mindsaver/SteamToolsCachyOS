# Build Electron AppImage + pacman from tag or manual dispatch and upload to GitHub Releases.
# Generates latest-linux.yml so electron-updater auto-update works.
name: Release Electron

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v (e.g. 1.2.3); creates tag and release v1.2.3 on main"
        required: true
        type: string
      prerelease:
        description: "Prerelease"
        required: false
        type: boolean
        default: false
      draft:
        description: "Draft release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-electron-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-electron:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject duplicate tag or release (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${{ inputs.version }}"
          v="v${ver}"
          git fetch --tags --force origin
          if [ -n "$(git tag -l "$v")" ]; then
            echo "Tag ${v} already exists."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev libnotify-dev libgconf-2-4 libnss3 libxss1 \
            libasound2 libxtst6 xauth xvfb \
            rpm fakeroot dpkg

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Set app version from tag
        working-directory: app
        run: |
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version || true

      - name: Build renderer + main
        working-directory: app
        run: npm run build

      - name: Run unit tests
        working-directory: app
        run: npm test

      - name: Package AppImage + pacman
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --linux AppImage pacman --publish never

      - name: List dist artifacts
        run: ls -la app/dist/

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          prerelease: ${{ inputs.prerelease || false }}
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: |
            app/dist/*.AppImage
            app/dist/*.AppImage.sha512
            app/dist/*.pkg.tar.zst
            app/dist/latest-linux.yml

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"
