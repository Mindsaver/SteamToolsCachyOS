appId: com.mindsaver.steamtoolscachyos
productName: SteamToolsCachyOS
copyright: Copyright © 2024 Mindsaver

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - resources/**/*

linux:
  icon: resources/icons
  category: Utility
  description: Steam toolkit for CachyOS and other Linux distros
  desktop:
    Name: SteamToolsCachyOS
    Comment: Steam symlink hub, FSR DLL helper, launch options manager
    Categories: Utility;Game;
    Keywords: Steam;CachyOS;FSR;Proton;Gaming;
  executableName: SteamToolsCachyOS
  artifactName: SteamToolsCachyOS-Linux-x86_64.${ext}

appImage:
  license: LICENSE

pacman:
  fpm:
    - "--depends=steam"

publish:
  provider: github
  owner: Mindsaver
  repo: SteamToolsCachyOS
  releaseType: release

targets:
  linux:
    target:
      - target: AppImage
        arch: [x64]
      - target: pacman
        arch: [x64]
